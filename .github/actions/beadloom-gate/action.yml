name: Beadloom Gate
description: >-
  Tool-agnostic enforcement gate. Runs `beadloom ci` (reindex -> lint ->
  sync-check -> config-check -> optional federate landscape gate) as a single
  verdict with one exit code. Thin wrapper — all logic lives in the CLI.

inputs:
  fail-on:
    description: >-
      Federate fail-set (comma-separated). A bare value or 'default' uses the
      safe default (breaking,drift,orphaned_consumer,undeclared_producer).
      Only applied when hub-exports is set. Empty = no federate gate.
    required: false
    default: ""
  hub-exports:
    description: >-
      Space-separated satellite export artifact path(s). When set, the
      cross-service federate landscape gate runs. Empty = per-repo gate only.
    required: false
    default: ""
  format:
    description: "Output format: rich | json | github (default github — annotates the PR)."
    required: false
    default: "github"
  no-reindex:
    description: "Skip the reindex step (set true when the caller reindexes separately)."
    required: false
    default: "false"
  project:
    description: "Project root passed to `beadloom ci --project`."
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      shell: bash
      run: uv python install 3.12

    - name: Install dependencies
      shell: bash
      run: uv sync --extra dev --extra languages

    - name: Beadloom CI gate
      shell: bash
      env:
        BEADLOOM_FAIL_ON: ${{ inputs.fail-on }}
        BEADLOOM_HUB_EXPORTS: ${{ inputs.hub-exports }}
        BEADLOOM_FORMAT: ${{ inputs.format }}
        BEADLOOM_NO_REINDEX: ${{ inputs.no-reindex }}
        BEADLOOM_PROJECT: ${{ inputs.project }}
      run: |
        set -euo pipefail
        args=(ci --format "$BEADLOOM_FORMAT" --project "$BEADLOOM_PROJECT")
        if [ "$BEADLOOM_NO_REINDEX" = "true" ]; then
          args+=(--no-reindex)
        fi
        for export in $BEADLOOM_HUB_EXPORTS; do
          args+=(--hub "$export")
        done
        if [ -n "$BEADLOOM_FAIL_ON" ]; then
          args+=(--fail-on "$BEADLOOM_FAIL_ON")
        fi
        uv run beadloom "${args[@]}"
