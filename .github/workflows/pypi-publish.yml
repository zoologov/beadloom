name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  # BDL-050: tests.yml was folded into ci.yml (consolidated PR pipeline), so the
  # release pipeline inlines the same 3.10-3.13 matrix it used to call via
  # `workflow_call`. (ci.yml runs on pull_request only — it can't be a reusable
  # workflow here.)
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra languages --extra tui --extra watch

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        # The AI tech-writer harness moved into src/beadloom/ai_agents/ (BDL-051 S2),
        # so it's covered by `src/` — no separate `tools/` path anymore.
        run: uv run mypy src/

      - name: Tests with coverage
        run: uv run pytest --cov=beadloom --cov-report=term-missing --cov-fail-under=80

  release-gates:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra languages

      - name: Reindex
        run: uv run beadloom reindex

      - name: Architecture lint
        run: uv run beadloom lint --strict

      - name: Doc-code sync check
        run: uv run beadloom sync-check

      # Phase 12.11 — uncomment when implemented
      # - name: Meta-doc audit
      #   run: uv run beadloom docs audit --fail-if=stale>0

      # Phase 12.9 — uncomment when implemented
      # - name: Debt report
      #   run: uv run beadloom status --debt-report --fail-if=score>50

  build:
    needs: [tests, release-gates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build package
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-install:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install from wheel
        run: uv tool install dist/*.whl

      - name: Verify CLI works
        run: beadloom --version

  publish-testpypi:
    needs: test-install
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
