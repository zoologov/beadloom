# AI tech-writer (BDL-047 / F4.1) — GitHub wrapper around the one harness.
#
# Thin wrapper: it only triggers + wires the secret + picks the platform flag.
# All orchestration lives in tools/ai_techwriter (python -m tools.ai_techwriter).
# The GitLab counterpart (.gitlab-ci.yml ai-techwriter job) calls the SAME
# entrypoint — only the trigger, the secret naming, and --platform differ
# (RFC Q5 table). Distinct from tests.yml / deploy-site.yml (do not touch those).
name: AI tech-writer

on:
  # Trigger on push to main/master (G10) — refresh docs as soon as code lands,
  # closing the staleness window a nightly schedule would leave open. The
  # concurrency group below + the no-auto-merge / 0-stale-no-op design keep this
  # loop-safe (the agent's merged PR triggers a clean no-op run).
  push:
    branches: [main, master]
  # Manual dispatch stays useful (re-run on demand). Optional `since` input lets
  # an operator re-run over an explicit baseline ref (e.g. re-check accumulated
  # drift); when empty it falls back to the push parent / HEAD~1.
  workflow_dispatch:
    inputs:
      since:
        description: "Baseline git ref for drift detection (default: push parent / HEAD~1)"
        required: false
        default: ""

# gh pr create needs write to contents (push the branch) + pull-requests.
permissions:
  contents: write
  pull-requests: write

# One run at a time: never open competing refresh PRs.
concurrency:
  group: ai-techwriter
  cancel-in-progress: false

jobs:
  ai-techwriter:
    # Self-hosted VPS runner where Goose + the API key live (RFC Q5).
    runs-on: [self-hosted, ai-techwriter]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so git diff / the gate can read prior state.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Beadloom (the substrate) + the harness deps, pinned via the lockfile.
      - name: Install Beadloom + harness deps
        run: uv sync --extra dev --extra languages

      # Goose is provisioned on the self-hosted runner image (pinned there);
      # this step asserts it is present rather than installing ad hoc.
      - name: Verify Goose is available (pinned on the runner)
        run: goose --version

      # Rebuild the index so sync-check sees current code↔doc state.
      - name: Beadloom reindex
        run: uv run beadloom reindex

      # The one entrypoint. 0 stale → clean no-op exit 0; flagged → non-zero.
      #
      # --since <push parent> makes drift detection baseline-relative: a fresh
      # checkout re-baselines sync_state to the just-pushed code, so without a
      # ref baseline sync-check reports 0 stale even when the push left a doc
      # behind. `github.event.before` is the push parent; it is an all-zero SHA
      # on a first push / force-push, and unset on workflow_dispatch — the guard
      # falls back to HEAD~1 in both cases (and the harness defensively treats a
      # zero SHA as "no baseline" too).
      - name: Run AI tech-writer harness (GitHub)
        env:
          # Repository secret — never inlined; resolved only on the runner.
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          # Workspace-specific MaaS endpoint (secret); falls back to the generic
          # DashScope gateway in the harness when unset.
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          # gh pr create authenticates with the job token.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
          INPUT_SINCE: ${{ inputs.since }}
        run: |
          # Prefer an explicit dispatch input, else the push parent, else HEAD~1.
          since="${INPUT_SINCE:-$BEFORE_SHA}"
          case "$since" in
            ""|0000000000000000000000000000000000000000) since="HEAD~1" ;;
          esac
          uv run python -m tools.ai_techwriter --platform github --since "$since"
