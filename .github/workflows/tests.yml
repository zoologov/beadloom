name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/tests.yml'
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra languages --extra tui --extra watch

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ tools/

      - name: Type check (mypy)
        # tools/ holds the BDL-047 AI tech-writer harness (repo tooling, not the
        # installed beadloom wheel) — type-checked alongside the core package.
        run: uv run mypy src/ tools/

      - name: Tests with coverage
        run: uv run pytest --cov=beadloom --cov-report=term-missing --cov-fail-under=80
