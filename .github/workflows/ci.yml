# Consolidated PR pipeline (BDL-050) — replaces the three independent PR
# workflows (beadloom-gate.yml / tests.yml / ai-techwriter.yml) with ONE ordered
# pipeline so merge-ability means "everything that protects main is green":
#
#   PR open ─► gate ─┐
#             tests ─┼─(all green?)─► ai-techwriter ─► PR unblocked
#        site-build ─┘   └─(any red)──► ai-techwriter skipped → PR blocked
#
# gate / tests / site-build run in parallel on GitHub-hosted runners;
# ai-techwriter (self-hosted VPS where Goose + the API key live) has
# `needs: [gate, tests, site-build]` so a broken PR never spends Qwen tokens.
# deploy-site.yml stays the ONLY thing on push:main (main is green by
# construction under strict trunk-based — BDL-049).
name: CI

on:
  # Trunk-based (BDL-049): fire once per PR to main/master.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]
  # Manual dispatch keeps the ai-techwriter branch-PR fallback (no PR context).
  workflow_dispatch:
    inputs:
      since:
        description: "Baseline git ref for drift detection (default: HEAD~1)"
        required: false
        default: ""

# One run per PR; cancel a superseded run when a new commit lands.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ai-techwriter's pr-branch publisher pushes the refresh commit (contents) +
# posts a PR comment (pull-requests).
permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------- #
  # gate — the beadloom ci verdict (reindex -> lint -> sync-check -> doctor).
  # Same composite Action satellites consume (was beadloom-gate.yml).
  # ---------------------------------------------------------------------- #
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Beadloom gate
        uses: ./.github/actions/beadloom-gate
        with:
          format: github

  # ---------------------------------------------------------------------- #
  # tests — the 3.10-3.13 matrix (was tests.yml). NO paths filter: it runs on
  # every PR so each leg is a reliable required check (G2).
  # ---------------------------------------------------------------------- #
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra languages --extra tui --extra watch

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        # The AI tech-writer harness moved into src/beadloom/ai_agents/ (BDL-051 S2),
        # so it's covered by `src/` — no separate `tools/` path anymore.
        run: uv run mypy src/

      - name: Tests with coverage
        run: uv run pytest --cov=beadloom --cov-report=term-missing --cov-fail-under=80

  # ---------------------------------------------------------------------- #
  # site-build — regenerate + build the VitePress site on every PR (G3, closes
  # beadloom-wozp). The BUILD half of deploy-site (NO Pages deploy) — catches
  # VitePress/mermaid/interpolation breaks BEFORE they land on main.
  # ---------------------------------------------------------------------- #
  site-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra languages

      - name: Reindex graph
        run: uv run beadloom reindex

      - name: Generate the site from the graph
        run: uv run beadloom docs site --out site

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build the VitePress site
        run: npm run docs:build
        working-directory: site

  # ---------------------------------------------------------------------- #
  # ai-techwriter — runs ONLY after gate + tests + site-build are green, so a
  # broken PR never spends Qwen tokens (US-1). Body copied VERBATIM from the
  # retired ai-techwriter.yml (BDL-049 model) — only the trigger moved into this
  # file + the `needs:` was added. Do NOT change the harness invocation.
  # ---------------------------------------------------------------------- #
  ai-techwriter:
    needs: [gate, tests, site-build]
    # Self-hosted VPS runner where Goose + the API key live (RFC Q5).
    runs-on: [self-hosted, ai-techwriter]
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so git diff / the merge-base / the gate can read prior
          # state; check out the PR HEAD branch so the agent can commit onto it.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          # Persist a PAT (AI_TW_PAT) as the git credential `git push` uses.
          # WHY: GitHub does NOT re-trigger workflows on pushes authored by the
          # default GITHUB_TOKEN (anti-recursion) — so the agent's refresh
          # commit would NOT fire the `gate` check, leaving the required check
          # missing on the PR HEAD → unmergeable. A PAT-authored push is a
          # normal push → it triggers `gate`. The `[skip ai-techwriter]`
          # loop-guard above still stops THIS workflow re-running on that push.
          # Falls back to github.token when AI_TW_PAT is absent (variant-C:
          # PAT-less repos still check out + run, just without auto-gating).
          token: ${{ secrets.AI_TW_PAT || github.token }}

      # Loop-guard (G5): if the PR head commit is the agent's own refresh
      # (authored by beadloom-ai-techwriter OR a [skip ai-techwriter] subject),
      # skip — the agent's push must not spawn a second `synchronize` run.
      - name: Loop-guard (skip the agent's own refresh commit)
        run: |
          author="$(git log -1 --format='%an')"
          subject="$(git log -1 --format='%s')"
          if [ "$author" = "beadloom-ai-techwriter" ] || \
             printf '%s' "$subject" | grep -qF '[skip ai-techwriter]'; then
            echo "skip: PR head is the agent's own refresh commit"
            echo "AI_TW_SKIP=1" >> "$GITHUB_ENV"
          fi

      # S5 (BDL-052): enable setup-uv's built-in dependency cache so the
      # self-hosted runner skips re-downloading the wheels every PR.
      - name: Install uv
        if: env.AI_TW_SKIP != '1'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Beadloom (the substrate) + the harness deps, pinned via the lockfile.
      - name: Install Beadloom + harness deps
        if: env.AI_TW_SKIP != '1'
        run: uv sync --extra dev --extra languages

      # Goose is provisioned on the self-hosted runner image (pinned there);
      # this step asserts it is present rather than installing ad hoc.
      - name: Verify Goose is available (pinned on the runner)
        if: env.AI_TW_SKIP != '1'
        run: goose --version

      # S5 (BDL-052): cache the built index DB keyed on a hash of everything that
      # feeds it (the graph YAML + all source + all docs). On a hit the index is
      # already current for this exact tree, so the reindex below is skipped; any
      # graph/src/docs change rotates the key → miss → a full reindex runs.
      - name: Cache the Beadloom index
        if: env.AI_TW_SKIP != '1'
        id: index-cache
        uses: actions/cache@v4
        with:
          path: .beadloom/beadloom.db
          key: beadloom-index-${{ hashFiles('.beadloom/_graph/**', 'src/**', 'docs/**') }}

      # Rebuild the index so sync-check sees current code↔doc state — skipped on
      # a cache hit (the cached DB already matches this tree's hash).
      - name: Beadloom reindex
        if: env.AI_TW_SKIP != '1' && steps.index-cache.outputs.cache-hit != 'true'
        run: uv run beadloom reindex

      # PR path: --since is the merge-base of the PR base and HEAD — exactly
      # "what this PR changed" (robust when the branch is behind/ahead of base).
      # Falls back to the PR base SHA if merge-base cannot resolve. The agent
      # commits the refresh onto the PR head branch + comments on the PR.
      - name: Run AI tech-writer harness (GitHub · pr-branch)
        if: env.AI_TW_SKIP != '1' && github.event_name == 'pull_request'
        env:
          # Repository secret — never inlined; resolved only on the runner.
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          # Workspace-specific MaaS endpoint (secret); falls back to the generic
          # DashScope gateway in the harness when unset.
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          # gh push + gh pr comment authenticate with the PAT so the agent's
          # refresh commit triggers the `gate` check (GITHUB_TOKEN pushes are
          # non-recursive — see the checkout token comment above). Falls back to
          # GITHUB_TOKEN when AI_TW_PAT is absent (variant-C).
          GH_TOKEN: ${{ secrets.AI_TW_PAT || secrets.GITHUB_TOKEN }}
          # The pr-branch publisher resolves the PR to comment on from this.
          PR_URL: ${{ github.event.pull_request.html_url }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          since="$(git merge-base "origin/$BASE_REF" HEAD 2>/dev/null || true)"
          if [ -z "$since" ]; then since="$BASE_SHA"; fi
          uv run python -m beadloom.ai_agents.ai_techwriter \
            --platform github --target pr-branch --since "$since"

      # Manual dispatch path: no PR context, so keep the branch-PR publish path
      # (cuts a doc-refresh branch + opens a PR). --since is the operator input
      # when given, else HEAD~1.
      - name: Run AI tech-writer harness (GitHub · branch-pr · manual)
        if: env.AI_TW_SKIP != '1' && github.event_name == 'workflow_dispatch'
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_SINCE: ${{ inputs.since }}
        run: |
          since="${INPUT_SINCE:-HEAD~1}"
          case "$since" in "") since="HEAD~1" ;; esac
          uv run python -m beadloom.ai_agents.ai_techwriter \
            --platform github --target branch-pr --since "$since"
