  # Real producer->consumer contract (BDL-041 F4.4): the beadloom service
  # PRODUCES the site data (graph pages, dashboard.data.json, landscape Mermaid);
  # the VitePress site CONSUMES it. Both sides share one contract_key so the
  # local landscape map reconciles them to a CONFIRMED verdict (honest, real).
  - src: vitepress-site
    dst: beadloom
    kind: part_of
  - src: beadloom
    dst: vitepress-site
    kind: produces
    contract:
      protocol: site-data
      message_type: site-bundle
      direction: produces
  - src: vitepress-site
    dst: beadloom
    kind: consumes
    contract:
      protocol: site-data
      message_type: site-bundle
      direction: consumes

  # Application → domain / infrastructure usage edges
  - src: application
    dst: context-oracle
    kind: uses
  - src: application
    dst: doc-sync
    kind: uses
  - src: application
    dst: graph
    kind: uses
  - src: application
    dst: onboarding
    kind: uses
  - src: application
    dst: infrastructure
    kind: uses
