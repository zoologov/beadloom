nodes:
  # Root service
  - ref_id: beadloom
    kind: service
    summary: "Beadloom CLI + MCP server — Context Oracle + Doc Sync v2 Engine (v1.5.0)"
    source: src/beadloom/
    docs:
      - docs/architecture.md
      - docs/getting-started.md
      - docs/guides/ci-setup.md

  # Domain: Context Oracle
  - ref_id: context-oracle
    kind: domain
    summary: "Context bundle building via BFS graph traversal, code indexing, caching, search"
    source: src/beadloom/context_oracle/
    tags: [layer-domain]
    docs:
      - docs/domains/context-oracle/README.md

  # Domain: Doc Sync
  - ref_id: doc-sync
    kind: domain
    summary: "Doc-code synchronization tracking and stale detection"
    source: src/beadloom/doc_sync/
    tags: [layer-domain]
    docs:
      - docs/domains/doc-sync/README.md

  # Domain: Graph
  - ref_id: graph
    kind: domain
    summary: "YAML graph format, loader, diff, rule engine, import resolver, linter"
    source: src/beadloom/graph/
    tags: [layer-domain]
    docs:
      - docs/domains/graph/README.md

  # Domain: Onboarding
  - ref_id: onboarding
    kind: domain
    summary: "Project bootstrap, doc import, architecture-aware presets, doc generation"
    source: src/beadloom/onboarding/
    tags: [layer-domain]
    docs:
      - docs/domains/onboarding/README.md

  # Feature: Doc Generator
  - ref_id: doc-generator
    kind: feature
    summary: "Doc skeleton generation + AI polish data from architecture graph"
    source: src/beadloom/onboarding/doc_generator.py
    docs:
      - docs/domains/onboarding/features/doc-generator/SPEC.md

  # Domain: Infrastructure
  - ref_id: infrastructure
    kind: domain
    summary: "Domain-agnostic SQLite database layer, health metrics, git activity"
    source: src/beadloom/infrastructure/
    tags: [layer-infra]
    docs:
      - docs/domains/infrastructure/README.md

  # Application: use-case orchestration layer
  - ref_id: application
    kind: domain
    summary: "Use-case orchestration: reindex, doctor, debt report, file watcher"
    source: src/beadloom/application/
    tags: [layer-application]
    docs:
      - docs/domains/application/README.md

  # Domain: AI Agents (governed AI-agent harnesses, shipped in the wheel)
  - ref_id: ai_agents
    kind: domain
    summary: "Governed AI-agent harnesses (Goose + model) over Beadloom read APIs + bd/beadloom shells; ships in the package"
    source: src/beadloom/ai_agents/
    tags: [layer-domain]
    docs:
      - docs/domains/ai_agents/README.md

  # Feature: AI Tech-Writer (the deterministic doc-refresh harness)
  - ref_id: ai-techwriter
    kind: feature
    summary: "Deterministic, seam-isolated PR-triggered doc-refresh harness (discover drift -> packet -> agent -> fixpoint -> gate -> publish; verdict ok/flagged/infra)"
    source: src/beadloom/ai_agents/ai_techwriter/
    docs:
      - docs/domains/ai_agents/features/ai-techwriter/SPEC.md

  # Service: CLI
  - ref_id: cli
    kind: service
    summary: "Click-based CLI — registration shell wiring the services/commands/ groups"
    source: src/beadloom/services/cli.py
    tags: [layer-service]
    docs:
      - docs/services/cli.md

  # Component: CLI command groups (BDL-059 S4 cohesion split of the cli monolith).
  # Dir-source covers every module under services/commands/ for module-coverage.
  - ref_id: cli-commands
    kind: component
    summary: "Cohesive Click command groups: query, index_ops, status, docsync, federation, docs, setup, dashboard, snapshot"
    source: src/beadloom/services/commands/__init__.py
    tags: [layer-service]

  # Service: MCP Server
  - ref_id: mcp-server
    kind: service
    summary: "MCP stdio server with 14 tools for AI agents"
    source: src/beadloom/services/mcp_server.py
    tags: [layer-service]
    docs:
      - docs/services/mcp.md

  # Service: TUI
  - ref_id: tui
    kind: service
    summary: "Interactive 3-screen architecture workstation with dashboard, explorer, doc status"
    source: src/beadloom/tui/
    tags: [layer-service]
    docs:
      - docs/services/tui.md

  # Feature: Doctor
  - ref_id: doctor
    kind: feature
    summary: "Validation checks for graph and data integrity"
    source: src/beadloom/application/doctor.py
    docs:
      - docs/domains/infrastructure/features/doctor/SPEC.md

  # Feature: Why (Impact Analysis)
  - ref_id: why
    kind: feature
    summary: "Impact analysis — upstream deps and downstream consumers via bidirectional BFS"
    source: src/beadloom/context_oracle/why.py
    docs:
      - docs/domains/context-oracle/features/why/SPEC.md

  # Feature: Watcher
  - ref_id: watcher
    kind: feature
    summary: "File watcher for auto-reindex on changes"
    source: src/beadloom/application/watcher.py
    docs:
      - docs/domains/infrastructure/features/watcher/SPEC.md

  # Feature: Status (data-gathering for `beadloom status`; BDL-059 S4)
  - ref_id: status
    kind: feature
    summary: "Status data-gathering — index/coverage/health/trend counts + context-bundle metrics for the status command"
    source: src/beadloom/application/status.py

  # Feature: Search
  - ref_id: search
    kind: feature
    summary: "FTS5 full-text search across nodes and documentation"
    source: src/beadloom/context_oracle/search.py
    docs:
      - docs/domains/context-oracle/features/search/SPEC.md

  # Feature: Graph Diff
  - ref_id: graph-diff
    kind: feature
    summary: "Git ref comparison — added/removed/changed nodes and edges"
    source: src/beadloom/graph/diff.py
    docs:
      - docs/domains/graph/features/graph-diff/SPEC.md

  # Feature: Rule Engine (rules/ package — see SPEC; rule_engine.py is the
  # back-compat re-export shim and remains this node's nominal source file).
  - ref_id: rule-engine
    kind: feature
    summary: "Architecture-as-Code rule engine (rules/ package: types, loader, evaluators, cycles)"
    source: src/beadloom/graph/rule_engine.py
    docs:
      - docs/domains/graph/features/rule-engine/SPEC.md

  # Feature: Import Resolver
  - ref_id: import-resolver
    kind: feature
    summary: "Multi-language import analysis and depends_on edge generation"
    source: src/beadloom/graph/import_resolver.py
    docs:
      - docs/domains/graph/features/import-resolver/SPEC.md

  # Feature: C4 Architecture Diagrams
  - ref_id: c4-diagrams
    kind: feature
    summary: "C4 architecture model mapping with Mermaid and PlantUML renderers"
    source: src/beadloom/graph/c4.py
    docs:
      - docs/domains/graph/features/c4-diagrams/SPEC.md

  # Feature: Federation (federation/ package — see SPEC; __init__.py is the
  # back-compat re-export hub and remains this node's nominal source file).
  - ref_id: federation
    kind: feature
    summary: "Cross-repo federation (federation/ package: refs, export, reconcile, gate)"
    source: src/beadloom/graph/federation/__init__.py
    docs:
      - docs/domains/graph/features/federation/SPEC.md

  # Feature: Cache
  - ref_id: cache
    kind: feature
    summary: "ETag-based context bundle cache (in-memory + SQLite)"
    source: src/beadloom/context_oracle/cache.py
    docs:
      - docs/domains/context-oracle/features/cache/SPEC.md

  # Feature: Agent Prime
  - ref_id: agent-prime
    kind: feature
    summary: "Cross-IDE context injection via prime CLI/MCP + AGENTS.md + IDE adapters"
    source: src/beadloom/onboarding/scanner/__init__.py
    docs:
      - docs/domains/onboarding/features/agent-prime/SPEC.md

  # Feature: Debt Report (debt_report/ package — see SPEC; __init__.py is the
  # back-compat re-export hub and remains this node's nominal source file).
  - ref_id: debt-report
    kind: feature
    summary: "Architecture debt aggregation, scoring, trend tracking, and CI gating (debt_report/ package: models, config, collect, scoring, trend, render)"
    source: src/beadloom/application/debt_report/__init__.py
    docs:
      - docs/domains/infrastructure/features/debt-report/SPEC.md

  # Feature: Reindex (reindex/ package — decomposed by cohesion in BDL-059 S4:
  # models / rules_loader / indexing / enrichment / sync_state / change_detection
  # / full / incremental. The package __init__ is this node's source and re-exports
  # the stable public + back-compat surface.)
  - ref_id: reindex
    kind: feature
    summary: "Full + incremental reindex pipeline (reindex/ package: models, indexing, enrichment, sync-state, change-detection, full, incremental)"
    source: src/beadloom/application/reindex/__init__.py
    docs:
      - docs/domains/infrastructure/features/reindex/SPEC.md

  # Feature: Docs Audit
  - ref_id: docs-audit
    kind: feature
    summary: "Zero-config meta-doc staleness detection via keyword-proximity matching"
    source: src/beadloom/doc_sync/audit.py
    docs:
      - docs/domains/doc-sync/features/docs-audit/SPEC.md

  # === BDL-051 S3b (BEAD-14): full module-coverage classification ===

  # --- Features (capabilities with a SPEC.md) ---

  - ref_id: code-indexer
    kind: feature
    summary: "Tree-sitter code symbol indexer — parses src into symbols + extracts beadloom annotations"
    source: src/beadloom/context_oracle/code_indexer.py
    docs:
      - docs/domains/context-oracle/features/code-indexer/SPEC.md

  - ref_id: route-extraction
    kind: feature
    summary: "API route extraction — tree-sitter AST + regex fallback across 12 web frameworks"
    source: src/beadloom/context_oracle/route_extractor.py
    docs:
      - docs/domains/context-oracle/features/route-extraction/SPEC.md

  - ref_id: test-mapping
    kind: feature
    summary: "Test mapping — detect test frameworks and map test files to the source nodes they cover"
    source: src/beadloom/context_oracle/test_mapper.py
    docs:
      - docs/domains/context-oracle/features/test-mapping/SPEC.md

  - ref_id: sync-check
    kind: feature
    summary: "Doc-code sync engine — symbols_hash freshness state, stale detection, mark-synced baselining"
    source: src/beadloom/doc_sync/engine.py
    docs:
      - docs/domains/doc-sync/features/sync-check/SPEC.md

  - ref_id: snapshot
    kind: feature
    summary: "Architecture snapshot store — save, list, and compare graph states over time"
    source: src/beadloom/graph/snapshot.py
    docs:
      - docs/domains/graph/features/snapshot/SPEC.md

  - ref_id: ci-gate
    kind: feature
    summary: "Unified CI gate (`beadloom ci`) — one convergence point composing reindex/lint/sync-check/config-check/doctor/federate into a single verdict"
    source: src/beadloom/application/gate.py
    docs:
      - docs/domains/application/features/ci-gate/SPEC.md

  - ref_id: graph-reads
    kind: feature
    summary: "Application read facade over the infrastructure repository — lets the TUI read the graph index without a presentation->infrastructure import"
    source: src/beadloom/application/graph_reads.py
    docs:
      - docs/domains/application/features/graph-reads/SPEC.md

  - ref_id: config-check
    kind: feature
    summary: "AgentConfigAsCode — drift detection (and --fix) for generated agent-config artifacts (AGENTS.md, CLAUDE.md auto-blocks, IDE adapters)"
    source: src/beadloom/onboarding/config_sync.py
    docs:
      - docs/domains/onboarding/features/config-check/SPEC.md

  - ref_id: ai-techwriter-setup
    kind: feature
    summary: "`setup-ai-techwriter` — scaffold the packaged AI tech-writer harness (CI workflow + recipe + guide) into any repo; no vendoring"
    source: src/beadloom/onboarding/ai_techwriter_setup.py
    docs:
      - docs/domains/onboarding/features/ai-techwriter-setup/SPEC.md

  - ref_id: branch-protection
    kind: feature
    summary: "`setup-branch-protection` — idempotent main branch-protection (PR-required + ci.yml required status checks)"
    source: src/beadloom/onboarding/branch_protection.py
    docs:
      - docs/domains/onboarding/features/branch-protection/SPEC.md

  - ref_id: agentic-flow-setup
    kind: feature
    summary: "`setup-agentic-flow` — scaffold Beadloom's proven multi-agent dev flow (agents/commands templates, vendored 1:1 + drift-guard) into any repo"
    source: src/beadloom/onboarding/agentic_flow_setup.py
    docs:
      - docs/domains/onboarding/features/agentic-flow-setup/SPEC.md

  - ref_id: flow-config
    kind: feature
    summary: "`.beadloom/flow.yml` schema + loader (FlowConfig) — declares tools/architecture/stack/quality for the role configurator; strict validation + auto-detect/resolve defaults"
    source: src/beadloom/onboarding/flow_config.py
    docs:
      - docs/domains/onboarding/features/flow-config/SPEC.md

  - ref_id: role-composer
    kind: feature
    summary: "compose_role — assembles a role file from CORE + one architecture overlay (ddd/fsd) + stack overlays (python/fastapi/js/ts/vue), deterministically ordered"
    source: src/beadloom/onboarding/role_composer.py
    docs:
      - docs/domains/onboarding/features/role-composer/SPEC.md

  - ref_id: role-adapters
    kind: feature
    summary: "generate_adapters — writes per-tool role adapter sets (.claude/agents/*, .cursor/agents/* + Cursor orchestrator) from composed roles; the drift-guard's single writer"
    source: src/beadloom/onboarding/role_adapters.py
    docs:
      - docs/domains/onboarding/features/role-adapters/SPEC.md

  - ref_id: site-generation
    kind: feature
    summary: "`docs site` — generate the VitePress content tree from the indexed graph (About/architecture/per-node pages, dashboard, landscape, nav, mermaid guard)"
    source: src/beadloom/application/site.py
    docs:
      - docs/domains/application/features/site-generation/SPEC.md

  # --- Components (internal/infra building blocks with a DOC.md) ---

  - ref_id: graph-loader
    kind: component
    summary: "YAML graph parser + SQLite loader — reads .beadloom/_graph/*.yml into the nodes/edges tables"
    source: src/beadloom/graph/loader.py
    docs:
      - docs/domains/graph/components/graph-loader/DOC.md

  - ref_id: contracts
    kind: component
    summary: "First-class cross-service contract model + protocol-agnostic reconciliation (contract_key, ContractVerdict)"
    source: src/beadloom/graph/contracts.py
    docs:
      - docs/domains/graph/components/contracts/DOC.md

  - ref_id: sdl
    kind: component
    summary: "Minimal dependency-free GraphQL SDL surface extractor for the cross-service contract graph"
    source: src/beadloom/graph/sdl.py
    docs:
      - docs/domains/graph/components/sdl/DOC.md

  - ref_id: graphql_surface
    kind: component
    summary: "Typed GraphQL Tier-A surface extraction (queries/mutations/subscriptions; field types + nullability/list + args) via the optional graphql-core extra, honest name-level fallback"
    source: src/beadloom/graph/graphql_surface.py
    docs:
      - docs/domains/graph/components/graphql_surface/DOC.md

  - ref_id: graphql_breaking
    kind: component
    summary: "Native typed GraphQL breaking analysis — names consumer references the producer breaks (absent / type-narrowed / nullability / arg break); additive changes benign"
    source: src/beadloom/graph/graphql_breaking.py
    docs:
      - docs/domains/graph/components/graphql_breaking/DOC.md

  - ref_id: context-builder
    kind: component
    summary: "Context bundle builder — BFS subgraph traversal + bundle assembly for ctx/prime"
    source: src/beadloom/context_oracle/builder.py
    docs:
      - docs/domains/context-oracle/components/context-builder/DOC.md

  - ref_id: doc-indexer
    kind: component
    summary: "Document indexer — Markdown scanning, chunking, and SQLite population for docs"
    source: src/beadloom/doc_sync/doc_indexer.py
    docs:
      - docs/domains/doc-sync/components/doc-indexer/DOC.md

  - ref_id: atomic-io
    kind: component
    summary: "Atomic YAML writes — temp-file + os.replace so a crash mid-write never corrupts the source-of-truth graph YAML"
    source: src/beadloom/infrastructure/atomic_io.py
    docs:
      - docs/domains/infrastructure/components/atomic-io/DOC.md

  - ref_id: db
    kind: component
    summary: "SQLite database layer — connection management, schema creation, meta helpers"
    source: src/beadloom/infrastructure/db.py
    docs:
      - docs/domains/infrastructure/components/db/DOC.md

  - ref_id: repository
    kind: component
    summary: "Centralized typed read queries over the graph-index tables (nodes/edges/docs/sync_state/code_symbols)"
    source: src/beadloom/infrastructure/repository.py
    docs:
      - docs/domains/infrastructure/components/repository/DOC.md

  - ref_id: git-activity
    kind: component
    summary: "Git history analysis — per-node commit activity, contributors, and activity classification"
    source: src/beadloom/infrastructure/git_activity.py
    docs:
      - docs/domains/infrastructure/components/git-activity/DOC.md

  - ref_id: health
    kind: component
    summary: "Health metrics — snapshots, trend computation, and the Rich health dashboard"
    source: src/beadloom/infrastructure/health.py
    docs:
      - docs/domains/infrastructure/components/health/DOC.md

  - ref_id: mcp-tools
    kind: component
    summary: "Canonical catalog of MCP tool names — single source of truth shared by the MCP server and the docs generator"
    source: src/beadloom/infrastructure/mcp_tools.py
    docs:
      - docs/domains/infrastructure/components/mcp-tools/DOC.md

  - ref_id: scan-paths
    kind: component
    summary: "Scan-path resolution — reads source scan directories from config.yml so domains resolve them without importing application"
    source: src/beadloom/infrastructure/scan_paths.py
    docs:
      - docs/domains/infrastructure/components/scan-paths/DOC.md

  - ref_id: bd-seam
    kind: component
    summary: "Mockable seam over the `bd` (beads) CLI — funnels every bd invocation through one testable function"
    source: src/beadloom/services/bd_seam.py
    docs:
      - docs/services/components/bd-seam/DOC.md

  - ref_id: active-table
    kind: component
    summary: "Shared ACTIVE.md bead-status table parser/updater + reconcile-from-bd core (tolerant, fail-safe; MCP S4 tools + active-sync build on it)"
    source: src/beadloom/application/active_table.py
    docs:
      - docs/domains/application/components/active-table/DOC.md

  # Site consumer: the VitePress documentation site. It does not live in
  # src/beadloom/ — it is the published artifact that CONSUMES the data the
  # beadloom service produces (the generated graph pages, dashboard.data.json,
  # landscape Mermaid). Modelled so the own-site landscape map shows a real,
  # honest producer->consumer contract (BDL-041 F4.4) instead of a foreign fixture.
  - ref_id: vitepress-site
    kind: site
    summary: "VitePress documentation site — renders the beadloom-produced site data (graph pages, dashboard.data.json, landscape Mermaid)"
    source: site/

