version: 3

tags:
  layer-service: [cli, mcp-server, tui]
  layer-application: [application]
  layer-domain: [context-oracle, doc-sync, graph, onboarding, ai_agents]
  layer-infra: [infrastructure]

rules:
  - name: domain-needs-parent
    description: "Every domain must be part_of the beadloom service"
    require:
      for: { kind: domain }
      has_edge_to: { ref_id: beadloom }
      edge_kind: part_of

  - name: feature-needs-domain
    description: "Every feature must be part_of a domain"
    require:
      for: { kind: feature }
      has_edge_to: { kind: domain }
      edge_kind: part_of

  - name: service-needs-parent
    description: "Every service (except root) must be part_of the beadloom service"
    require:
      for: { kind: service, exclude: [beadloom] }
      has_edge_to: { ref_id: beadloom }
      edge_kind: part_of

  - name: no-domain-depends-on-service
    description: "Domains must not have depends_on edges to services"
    deny:
      from: { kind: domain }
      to: { kind: service }
      unless_edge: [part_of]

  - name: no-dependency-cycles
    description: "No circular depends_on chains"
    severity: error
    forbid_cycles:
      edge_kind: depends_on

  - name: architecture-layers
    description: "Services → application → domains → infrastructure — not reverse"
    severity: error
    layers:
      - name: services
        tag: layer-service
      - name: application
        tag: layer-application
      - name: domains
        tag: layer-domain
      - name: infrastructure
        tag: layer-infra
    enforce: top-down
    allow_skip: true
    edge_kind: depends_on

  - name: domain-size-limit
    description: "Domains should not have too many symbols"
    severity: warn
    check:
      for: { kind: domain }
      max_symbols: 200

  - name: unregistered-feature-candidate
    description: "Substantial domain-only modules that model no feature (candidates)"
    severity: warn
    unregistered_feature_candidate:
      for: { kind: domain }
      min_symbols: 5
      # Accepted domain-level plumbing (listed in the domain README, no SPEC).
      exclude:
        - "**/onboarding/config_reader.py"
        - "**/onboarding/presets.py"

  - name: tui-no-direct-infra
    description: "TUI must not import infrastructure directly"
    forbid_import:
      from: "src/beadloom/tui/**"
      to: "src/beadloom/infrastructure/**"

  - name: onboarding-no-direct-infra
    description: "Onboarding must not import infrastructure directly"
    forbid_import:
      from: "src/beadloom/onboarding/**"
      to: "src/beadloom/infrastructure/**"

  # ai_agents is a leaf consumer (BDL-051 / S2): it MAY consume application /
  # context_oracle / graph / doc_sync read APIs + the bd/beadloom shells, but it
  # must NOT be imported BY the core. These two forbid_import rules cover the
  # core source dirs without matching ai_agents' own internal imports — the
  # ``a[!i]*`` pattern picks ``application`` while excluding ``ai_agents``, and
  # ``[!a]*`` picks every other (context_oracle / doc_sync / graph /
  # infrastructure / onboarding / services / tui) source dir.
  - name: core-no-import-ai-agents
    description: "Core domains/services must not import the ai_agents domain"
    severity: error
    forbid_import:
      from: "src/beadloom/[!a]*/**"
      to: "beadloom/ai_agents/**"

  - name: application-no-import-ai-agents
    description: "Application must not import the ai_agents domain (leaf consumer only)"
    severity: error
    forbid_import:
      from: "src/beadloom/a[!i]*/**"
      to: "beadloom/ai_agents/**"
