# GitLab CI — consolidated pipeline (BDL-050) mirroring the GitHub ci.yml.
# ONE ordered pipeline so merge-ability means "everything that protects the
# trunk is green":
#
#   MR open ─► verify(gate ∥ tests ∥ site-build) ─► docs(ai-techwriter)
#
# Stage `verify` runs gate / tests (3.10-3.13 matrix) / site-build in parallel
# on shared runners; stage `docs` runs ai-techwriter ONLY after all three are
# green (`needs: [gate, tests, site-build]`) so a broken MR never spends Qwen
# tokens. The ai-techwriter job is the GitLab counterpart of GitHub's
# ai-techwriter job and calls the SAME entrypoint (python -m beadloom.ai_agents.ai_techwriter)
# — only the trigger, the secret naming, and --platform differ.
#
# Verdict exit codes are honoured by the harness itself (beadloom/ai_agents/ai_techwriter):
# ok/infra -> exit 0 (a dead runner / exhausted quota does NOT block the MR),
# flagged -> exit 1 (a real unresolved doc drift fails the job). So no GitLab
# `allow_failure` is needed — the job runs and its exit code gates.
#
# ADOPTERS: `gate` runs `beadloom ci` directly via uv (no extra setup). When
# this repo merges into an existing .gitlab-ci.yml, only the ai-techwriter job
# is appended (the verify-stage jobs assume Beadloom owns the pipeline).

stages:
  - verify
  - docs

# --------------------------------------------------------------------------- #
# gate — the `beadloom ci` verdict (reindex -> lint -> sync-check ->
# config-check -> doctor) run directly via uv.
# --------------------------------------------------------------------------- #
gate:
  stage: verify
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  variables:
    GIT_DEPTH: "0"
  script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --extra dev --extra languages
    - uv run beadloom ci

# --------------------------------------------------------------------------- #
# tests — the 3.10-3.13 matrix. NO paths filter: it runs on every MR so each
# leg is a reliable required check.
# --------------------------------------------------------------------------- #
tests:
  stage: verify
  image: python:${PYTHON_VERSION}-slim
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --extra dev --extra languages
    - uv run pytest

# --------------------------------------------------------------------------- #
# site-build — regenerate + build the docs site on every MR (the BUILD half,
# no deploy) so doc/site breaks are caught BEFORE they land on the trunk.
# --------------------------------------------------------------------------- #
site-build:
  stage: verify
  image: node:22-bullseye
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv python install 3.12
    - uv sync --extra dev --extra languages
    - uv run beadloom reindex
    - uv run beadloom docs site --out site
    - cd site && npm ci && npm run docs:build

# --------------------------------------------------------------------------- #
# ai-techwriter — runs ONLY after gate + tests + site-build are green
# (`needs:`), so a broken MR never spends Qwen tokens. Body preserved from the
# BDL-049 model — only the trigger / secret naming / --platform differ.
# --------------------------------------------------------------------------- #
ai-techwriter:
  stage: docs
  needs:
    - gate
    - tests
    - site-build
  # Self-hosted GitLab Runner where Goose + the API key live.
  tags:
    - self-hosted
    - ai-techwriter
  # Trunk-based: run on a merge request (the GitLab mirror of GitHub's
  # pull_request) — once per MR against the MR's own diff (--since merge-base).
  # The agent commits its refresh onto the MR source branch (--target pr-branch),
  # and the loop-guard below keeps the agent's own push from re-triggering.
  # Manual ("Run pipeline") stays available.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  variables:
    # Full clone so git diff / the merge-base / the gate can read prior state.
    GIT_DEPTH: "0"
  script:
    # Loop-guard: skip the agent's own refresh commit (authored by
    # beadloom-ai-techwriter OR a [skip ai-techwriter] subject) so its push to
    # the MR source branch does not re-trigger the pipeline.
    - author="$(git log -1 --format='%an')"
    - subject="$(git log -1 --format='%s')"
    - |
      if [ "$author" = "beadloom-ai-techwriter" ] || \
         printf '%s' "$subject" | grep -qF '[skip ai-techwriter]'; then
        echo "skip: MR head is the agent's own refresh commit"; exit 0
      fi
    # Install uv (pinned), then Beadloom (the substrate) + harness deps.
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --extra dev --extra languages
    # Goose is provisioned on the self-hosted runner image (pinned there).
    - goose --version
    # Point the push remote + glab at an access token so the agent's refresh
    # commit TRIGGERS the MR pipeline. WHY: a push authenticated with
    # CI_JOB_TOKEN does NOT trigger a new pipeline (anti-recursion) — so your
    # required check would be missing on the MR HEAD.
    # ADOPTERS: create a project/group access-token CI/CD variable `AI_TW_PAT`
    # (scopes: api + write_repository). WITHOUT it, the agent's commit will NOT
    # auto-trigger your required pipeline — you'd have to re-run it manually.
    # Falls back to CI_JOB_TOKEN when AI_TW_PAT is unset (push still works).
    - 'PUSH_TOKEN="${AI_TW_PAT:-$CI_JOB_TOKEN}"'
    - git remote set-url --push origin "https://gitlab-ci-token:${PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - 'export GITLAB_TOKEN="${AI_TW_PAT:-$CI_JOB_TOKEN}"'
    # Rebuild the index so sync-check sees current code-doc state.
    - uv run beadloom reindex
    # The one entrypoint. QWEN_API_KEY (+ optional QWEN_BASE_URL) are masked
    # CI/CD variables (never inlined), exposed to the job env automatically. The
    # pr-branch publisher commits the refresh onto $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    # and posts an MR note via glab; it resolves the MR from CI_MERGE_REQUEST_IID
    # + CI_MERGE_REQUEST_PROJECT_URL (exposed automatically on a merge_request_event).
    #
    # --since is the merge-base of the MR target branch and HEAD — exactly "what
    # this MR changed". Falls back to the MR diff base SHA if merge-base cannot
    # resolve.
    #
    # The harness exit code gates the job directly: ok/infra -> 0 (don't block),
    # flagged -> 1 (block). No allow_failure — the verdict IS the gate.
    - since="$(git merge-base "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" HEAD 2>/dev/null || true)"
    - if [ -z "$since" ]; then since="$CI_MERGE_REQUEST_DIFF_BASE_SHA"; fi
    - uv run python -m beadloom.ai_agents.ai_techwriter --platform gitlab --target pr-branch --since "$since"
