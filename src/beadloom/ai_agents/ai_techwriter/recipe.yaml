# Goose recipe: AI tech-writer — refresh ONE drifted Beadloom doc.
#
# BDL-047 / F4.1. Ported from .claude/agents/tech-writer.md, scoped down to a
# single per-doc rewrite driven by the deterministic harness
# (beadloom.ai_agents.ai_techwriter). The harness owns scope, mark-synced, the fixpoint, the
# gate, and the PR/MR — this recipe owns ONLY the rewrite of the doc named in
# the packet.
#
# Provider (Qwen3.7-Plus over an OpenAI-compatible / DashScope endpoint) and the
# API key (env QWEN_API_KEY, never inlined) are wired by ProviderConfig in
# provider.py via the process environment, NOT here.

version: "1.0.0"
title: "Beadloom AI tech-writer (per-doc refresh)"
description: >
  Rewrite exactly one drifted documentation file so it accurately reflects the
  current code, given a structured context packet assembled by the harness.

# The harness writes the per-doc input packet (RFC Q4) to a TEMP FILE and passes
# only its PATH here. BUG-C: the packet (full doc content + ctx + why + docs
# polish JSON) is tens of KB on real docs and blows ARG_MAX if inlined on argv
# (`[Errno 7] Argument list too long: 'goose'`), so the agent reads the JSON
# from `packet_file` via the allowed read-only filesystem tool instead.
#   { ref_id, doc_path, current_content, drift_reason, docs_polish_json, ctx, why }
parameters:
  - key: packet_file
    input_type: string
    requirement: required
    description: >
      Absolute path to a temp JSON file holding the context packet for the one
      drifted doc: ref_id, doc_path, current_content, drift_reason
      (symbols_changed / hash_changed / untracked + the changed code files),
      docs_polish_json[ref], ctx(ref), why(ref). Read it with the read-only
      filesystem tool — it is NOT inlined (ARG_MAX). The harness deletes the
      file after the run.

# Quality first: extended thinking stays ENABLED (RFC Q2, principle 10). Cost is
# bounded by scope + the harness's runaway hard caps, never by capping reasoning.
settings:
  thinking: true

# Constrained tool surface (RFC Q4): "safe by gate, not trust" + a small blast
# radius. Read-only filesystem (code + diffs), beadloom read commands, git read,
# and writes restricted to docs/** (and tracked doc files). No src/ writes, no
# arbitrary shell, no network except the model endpoint.
#
# CLOSED WHITELIST / DENY-ALL-UNLISTED (BEAD-11 hardening). The blast-radius
# guarantee MUST NOT depend on Goose's allow/deny default. We make it safe
# whichever way Goose resolves precedence:
#   * If Goose is deny-by-default (only `allow` is permitted): the `allow` list
#     below is already the closed whitelist — nothing else runs.
#   * If Goose is allow-by-default-then-subtract-`deny`: the catch-all denies
#     `fs.write:**` and `shell:**` at the END of `deny` close the surface, and
#     the narrow `allow` entries re-open ONLY the doc writes + read commands.
# Either way: write only docs/**, run only the listed read commands, nothing
# else. The catch-all denies are the load-bearing safety line — keep them LAST
# and do NOT remove them. BEAD-09 dogfood MUST prove this empirically (attempt a
# denied write to src/** and a denied `rm`/`curl`, confirm Goose refuses both)
# BEFORE any unattended scheduled run.
tools:
  allow:
    # read-only filesystem: read code, diffs, the current doc
    - "fs.read:**"
    # beadloom read commands (architecture truth) — pinned subcommands only
    - "shell:beadloom ctx *"
    - "shell:beadloom why *"
    - "shell:beadloom search *"
    - "shell:beadloom sync-check*"
    # git read commands (what changed) — pinned subcommands only
    - "shell:git diff*"
    - "shell:git log*"
    - "shell:git show*"
    # writes restricted to docs/** (and top-level tracked docs)
    - "fs.write:docs/**"
    - "fs.write:*.md"
  deny:
    # never write source or config (explicit, even though the catch-all covers it)
    - "fs.write:src/**"
    - "fs.write:tools/**"
    - "fs.write:.beadloom/**"
    # no arbitrary shell beyond the read commands above (explicit)
    - "shell:rm *"
    - "shell:curl *"
    - "shell:wget *"
    # beadloom commands that mutate baselines belong to the harness, not the agent
    - "shell:beadloom sync-update*"
    - "shell:beadloom reindex*"
    # CATCH-ALL (keep LAST): deny every write and every shell command not
    # explicitly re-opened in `allow` above. This is what makes the surface a
    # closed whitelist regardless of Goose's default allow/deny semantics.
    - "fs.write:**"
    - "shell:**"

instructions: >
  You are the Technical Writer + Systems Analyst for this repository. You make
  docs accurately reflect the code. You may write ONLY files under docs/** (and
  the single doc named in the packet). You never edit src/ or run mutating
  beadloom commands (sync-update / reindex / mark-synced) — those belong to the
  harness.

prompt: |
  Refresh exactly ONE drifted documentation file so it accurately reflects the
  current code. The path to a JSON file holding everything you need is
  `{{ packet_file }}` — read that file FIRST with the read-only filesystem tool
  (the packet is NOT inlined as a parameter). The JSON has these fields:

    - ref_id            — the graph node this doc documents
    - doc_path          — the ONE file you may rewrite (under docs/**)
    - current_content   — the current (stale) doc text
    - drift_reason      — why it is stale: symbols_changed / hash_changed /
                          untracked, plus the changed code files
    - docs_polish_json  — Beadloom's enrichment data for this ref
    - ctx               — `beadloom ctx <ref>`: current symbols, deps, files
    - why               — `beadloom why <ref>`: impact / dependents

  Procedure:
  1. Read the JSON file at `{{ packet_file }}` and parse it. Read the current doc and
     the code files named in `drift_reason`. Use `beadloom ctx <ref_id>` /
     `beadloom why <ref_id>` and
     read-only `git diff` / `git show` to understand exactly what changed.
  2. Reconcile the doc against the new code semantics: update the summary,
     module list, API signatures (use the CURRENT signatures), and testing
     notes. Reconcile doc<->code meaning — do not just rename symbols; explain
     behavior that actually changed.
  3. ACCURACY OVER VOLUME: write only what you can verify from the code. Mark
     anything you cannot confirm with `<!-- TODO: verify -->`. Do NOT invent
     behavior. Preserve the existing document structure; do not delete sections
     you did not update.
  4. Write the rewritten markdown to `doc_path` (and only that file).

  Freshness-baseline gotcha (important): `beadloom sync-check` can report a ref
  as `[ok]` even while a doc is semantically stale, because reindex resets the
  freshness baseline. Your job is to make the prose TRUE to the code, not merely
  to make symbol names match. The harness handles re-baselining (mark-synced)
  and the freshness gate after you finish — do not run those commands yourself.

  When done, emit a single-line JSON object on the LAST line of output so the
  harness can record honest usage (tokens are facts from the model API):

    {"rewritten_paths": ["docs/...md"], "input_tokens": <int>, "output_tokens": <int>, "model": "qwen3.7-plus"}
